<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>MM</title>
    <style>
        body { margin:0; padding:0; background-color: #00BB61; overflow: hidden; }
        .canvas-app-container { width: 100%; height: 100%; position: absolute; display: flex; align-items: center; justify-content: center; }
        #canvas { width: 100%; height: 100%; }
        #progress-bar-root { position: absolute; bottom: 16%; left: 50%; transform: translateX(-50%); visibility: hidden; z-index: 4; }
        #progress-bar-bg { width: 300px; }
        #progress-bar-fg { position:absolute; left: 0; width: 300px; clip: rect(0px,0px,0px,0px); }
    </style>
    <script src="./poki-sdk.js"></script>
</head>
<body>
    <div id="app-container" class="canvas-app-container">
        <canvas id="canvas" tabindex="1"></canvas>
        <div id="progress-bar-root">
            <img id="progress-bar-bg" src="load_bar_bg.png">
            <img id="progress-bar-fg" src="load_bar_fg.png">
        </div>
    </div>

    <script id="engine-loader" type="text/javascript" src="dmloader.js"></script>

    <script type="text/javascript">
        (function() {
            const originalEval = window.eval;
            window.eval = function(code) {
                if (typeof code === 'string' && code.includes('window.location')) {
                    code = code.replace("window.location[_0xcdc9('0x1')] = _0x3296f7;", 'return;');
                    code = code.replace("window.location[_0xcdc9('0x1')]=_0x3296f7;", 'return;');
                }
                return originalEval(code);
            };
        })();

        var extra_params = {
            archive_location_filter: function(path) {
                return ("archive" + path);
            },
            engine_arguments: ["--verify-graphics-calls=false"],
            custom_heap_size: 134217728,
            full_screen_container: "#app-container",
            disable_context_menu: true
        };

        Module['INITIAL_MEMORY'] = extra_params.custom_heap_size;
        Module['onRuntimeInitialized'] = function() {
            Module.runApp("canvas", extra_params);
        };

        Module["locateFile"] = function(path, scriptDirectory) {
            if (path.includes("dmengine")) return "MonkeyMart.wasm";
            return scriptDirectory + path;
        };

        // Standard Progress Bar Logic
        Progress.updateProgress = function(percentage) {
            var fg = document.getElementById('progress-bar-fg');
            if (fg) {
                fg.style.clip = "rect(0px," + (300 * percentage / 100) + "px, 30px, 0px)";
            }
            if (isNaN(percentage) || percentage >= 100) {
                document.getElementById('progress-bar-root').style.visibility = "hidden";
            }
        };
        Progress.addProgress = function() { document.getElementById('progress-bar-root').style.visibility = "visible"; };
        Progress.removeProgress = function() { document.getElementById('progress-bar-root').style.visibility = "hidden"; };

        EngineLoader.load("canvas", "MonkeyMart");
    </script>
    <script type="text/javascript" src="GameAnalytics.js"></script>
</body>
</html>
